<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini Global | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--green:#0B3D2E;
--gold:#D4AF37;
--dark:#050505;
--light:#f5f7fb;
--white:#ffffff;
--shadow:0 15px 40px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* ================= LOGIN BOX ================= */

.login-box{
width:100%;
max-width:420px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:var(--shadow);
text-align:center;
}

.login-box img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

.login-box h2{
color:var(--green);
margin-bottom:20px;
font-weight:900;
}

.input-box{
margin-bottom:15px;
text-align:left;
}

.input-box label{
font-weight:600;
font-size:14px;
}

.input-box input{
width:100%;
padding:14px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.btn-green{
background:var(--green);
color:white;
}

.btn-gold{
background:var(--gold);
color:black;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:var(--green);
font-weight:700;
text-decoration:none;
}

/* ================= MOBILE ================= */

@media(max-width:500px){
.login-box{
margin:20px;
}
}

</style>
</head>
<body>

<div class="login-box">

<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">

<h2>Login to Kabini</h2>

<div class="input-box">
<label>Email</label>
<input id="email" type="email" placeholder="Enter email">
</div>

<div class="input-box">
<label>Password</label>
<input id="password" type="password" placeholder="Enter password">
</div>

<button class="btn btn-green" onclick="login()">
Login
</button>

<button class="btn btn-gold" onclick="goRegister()">
Create Account
</button>

<div class="link">
<a href="index.html">Back to Home</a>
</div>

</div>

<script>

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let user=JSON.parse(localStorage.getItem("kabiniUser"));

if(!user){
alert("No account found. Please register first.");
return;
}

if(email===user.email && password==="1234"){

localStorage.setItem("kabiniLoggedIn","true");

alert("Login Successful");

window.location.href="account.html";

}else{

alert("Invalid login details");

}

}

function goRegister(){
window.location.href="register.html";
}

</script>

</body>
</html>
