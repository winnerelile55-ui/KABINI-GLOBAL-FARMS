<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini LTD | Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--green:#0B3D2E;
--gold:#D4AF37;
--dark:#050505;
--light:#f5f7fb;
--white:#ffffff;
--shadow:0 15px 40px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* ================= REGISTER BOX ================= */

.register-box{
width:100%;
max-width:450px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:var(--shadow);
text-align:center;
}

.register-box img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

.register-box h2{
color:var(--green);
margin-bottom:20px;
font-weight:900;
}

.input-box{
text-align:left;
margin-bottom:15px;
}

.input-box label{
font-weight:600;
font-size:14px;
}

.input-box input{
width:100%;
padding:14px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.btn-green{
background:var(--green);
color:white;
}

.btn-gold{
background:var(--gold);
color:black;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:var(--green);
text-decoration:none;
font-weight:700;
}

/* ================= MOBILE ================= */

@media(max-width:500px){
.register-box{
margin:20px;
}
}

</style>
</head>
<body>

<div class="register-box">

<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">

<h2>Create Account</h2>

<div class="input-box">
<label>Full Name</label>
<input id="name" type="text" placeholder="Enter name">
</div>

<div class="input-box">
<label>Email</label>
<input id="email" type="email" placeholder="Enter email">
</div>

<div class="input-box">
<label>Phone</label>
<input id="phone" type="text" placeholder="Enter phone">
</div>

<div class="input-box">
<label>Password</label>
<input id="password" type="password" placeholder="Create password">
</div>

<button class="btn btn-green" onclick="register()">
Register
</button>

<button class="btn btn-gold" onclick="goLogin()">
Already have account
</button>

<div class="link">
<a href="index.html">Back to Home</a>
</div>

</div>

<script>

function register(){

let user={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
password:document.getElementById("password").value
};

if(!user.name || !user.email || !user.phone || !user.password){
alert("Please fill all fields");
return;
}

localStorage.setItem("kabiniUser",JSON.stringify(user));

alert("Account created successfully");

window.location.href="login.html";

}

function goLogin(){
window.location.href="login.html";
}

</script>

</body>
</html>
