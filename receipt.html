<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini Global | Receipt</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--green:#0B3D2E;
--gold:#D4AF37;
--dark:#050505;
--light:#f5f7fb;
--white:#ffffff;
--shadow:0 15px 40px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--light);
overflow-x:hidden;
}

/* ================= NAVBAR ================= */

nav{
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:var(--shadow);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
}

.logo h2{
font-size:20px;
font-weight:800;
color:var(--green);
}

.hamburger{
font-size:28px;
cursor:pointer;
color:var(--green);
}

/* ================= MENU ================= */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
opacity:0;
visibility:hidden;
transition:.4s;
z-index:1999;
}

#menu{
position:fixed;
left:-100%;
top:0;
width:320px;
height:100%;
background:linear-gradient(135deg,#071d15,#0B3D2E,#143e2f);
padding:25px;
overflow-y:auto;
transition:.5s;
z-index:2000;
}

.menu-title{
font-size:26px;
font-weight:900;
color:white;
margin-bottom:25px;
text-align:center;
}

.menu-item{
display:block;
padding:16px;
margin-bottom:15px;
border-radius:15px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
color:white;
font-weight:700;
text-decoration:none;
box-shadow:
0 0 15px rgba(255,255,255,.5),
0 0 25px rgba(255,255,255,.3);
}

/* ================= RECEIPT ================= */

.hero{
padding:80px 20px;
text-align:center;
color:white;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1556742044-3c52d6e88c62');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:55px;
}

.receipt-section{
padding:60px 8%;
}

.receipt-box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:var(--shadow);
}

.receipt-header{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.receipt-header h2{
color:var(--green);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
}

th{
background:#f8f8f8;
}

.total{
text-align:right;
font-size:22px;
font-weight:800;
color:var(--green);
margin-top:20px;
}

/* ================= BUTTONS ================= */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin-top:15px;
}

.btn-green{
background:var(--green);
color:white;
}

.btn-gold{
background:var(--gold);
color:black;
}

/* ================= FLOAT ================= */

.float{
position:fixed;
right:20px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
cursor:pointer;
z-index:999;
}

.whatsapp{
bottom:20px;
background:#25D366;
color:white;
}

.instagram{
bottom:95px;
background:#E1306C;
color:white;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.hero h1{
font-size:35px;
}

#menu{
width:85%;
}

}

</style>
</head>
<body>

<nav>

<div class="hamburger" onclick="openMenu()">
<i class="fas fa-bars"></i>
</div>

<div class="logo">
<img src="kabini images/images/IMG-20260323-WA0001.jpg">
<h2>KABINI LTD</h2>
</div>

<div>
<i class="fas fa-receipt" style="font-size:25px;color:#0B3D2E;"></i>
</div>

</nav>

<div id="overlay" onclick="closeMenu()"></div>

<div id="menu">

<div class="menu-title">KABINI LTD</div>


<a href="index.htmll" class="menu-item">🏠 Home</a>

<a href="product.html" class="menu-item">🛒 Products</a>

<a href="contact.html" class="menu-item">📞 Contact Us</a>

<a href="cart.html" class="menu-item">🛍 Cart</a>

<a href="ai.html" class="menu-item">🤖 AI CHATBOT</a>

<a href="register.html" class="menu-item">👤 Register</a>

<a href="invoice.html" class="menu-item">🧾 Invoice</a>

<a href="order.html" class="menu-item">📦 Orders</a>

<a href="checkout.html" class="menu-item">📦 checkout</a>

<a href="receipt.html" class="menu-item">📦 receipt</a>



</div>

<section class="hero">
<h1>Receipt</h1>
<p>Instant purchase confirmation</p>
</section>

<section class="receipt-section">

<div class="receipt-box">

<div class="receipt-header">

<div>
<h2>Payment Receipt</h2>
<p>Automatically generated after checkout</p>
</div>

<div>
<p><b>Date:</b> <span id="date"></span></p>
<p><b>Receipt ID:</b> KG-RCPT-<span id="rid"></span></p>
</div>

</div>

<table>

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
</tr>
</thead>

<tbody id="receiptTable"></tbody>

</table>

<div class="total">
Total Paid: ₦<span id="total">0</span>
</div>

<button class="btn btn-green" onclick="downloadReceipt()">
Download Receipt
</button>

<button class="btn btn-gold" onclick="sendWhatsApp()">
Send via WhatsApp
</button>

</div>

</section>

<div class="float whatsapp" onclick="openWhatsApp()">
<i class="fab fa-whatsapp"></i>
</div>

<div class="float instagram" onclick="openInstagram()">
<i class="fab fa-instagram"></i>
</div>

<script>

const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");

function openMenu(){
menu.style.left="0";
overlay.style.opacity="1";
overlay.style.visibility="visible";
}

function closeMenu(){
menu.style.left="-100%";
overlay.style.opacity="0";
overlay.style.visibility="hidden";
}

document.getElementById("date").innerText=new Date().toLocaleDateString();
document.getElementById("rid").innerText=Math.floor(Math.random()*999999);

function loadReceipt(){

let orders=JSON.parse(localStorage.getItem("kabiniOrders"))||[];

let table=document.getElementById("receiptTable");
let total=0;

table.innerHTML="";

orders.forEach(order=>{

(order.items||[]).forEach(item=>{

let price=Number(item.price)||0;
total+=price;

table.innerHTML+=`
<tr>
<td>${item.name}</td>
<td>1</td>
<td>₦${price}</td>
</tr>
`;

});

});

document.getElementById("total").innerText=total.toLocaleString();

}

function downloadReceipt(){
alert("Receipt PDF download will be enabled in next upgrade.");
}

function sendWhatsApp(){

let msg="Hello Kabini LTD, here is my receipt request.";

window.open(
"https://wa.me/2348107808968?text="+encodeURIComponent(msg),
"_blank"
);

}

function openWhatsApp(){
window.open("https://wa.me/2348107808968","_blank");
}

function openInstagram(){
window.open("https://instagram.com","_blank");
}

loadReceipt();

</script>

</body>
</html>
