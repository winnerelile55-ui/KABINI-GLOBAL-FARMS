<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini Global | Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--green:#0B3D2E;
--gold:#D4AF37;
--dark:#050505;
--light:#f5f7fb;
--white:#ffffff;
--shadow:0 15px 40px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--light);
overflow-x:hidden;
}

/* ================= NAVBAR ================= */

nav{
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:var(--shadow);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
}

.logo h2{
font-size:20px;
font-weight:800;
color:var(--green);
}

.hamburger{
font-size:28px;
cursor:pointer;
color:var(--green);
}

/* ================= MENU ================= */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
opacity:0;
visibility:hidden;
transition:.4s;
z-index:1999;
}

#menu{
position:fixed;
left:-100%;
top:0;
width:320px;
height:100%;
background:linear-gradient(135deg,#071d15,#0B3D2E,#143e2f);
padding:25px;
overflow-y:auto;
transition:.5s;
z-index:2000;
}

.menu-title{
font-size:26px;
font-weight:900;
color:white;
margin-bottom:25px;
text-align:center;
}

.menu-item{
display:block;
padding:16px;
margin-bottom:15px;
border-radius:15px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
color:white;
font-weight:700;
text-decoration:none;
box-shadow:
0 0 15px rgba(255,255,255,.5),
0 0 25px rgba(255,255,255,.3);
}

/* ================= HERO ================= */

.hero{
padding:80px 20px;
text-align:center;
color:white;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1554224155-6726b3ff858f');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:55px;
}

/* ================= INVOICE ================= */

.invoice-section{
padding:60px 8%;
}

.invoice-box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:var(--shadow);
}

.invoice-header{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.invoice-header h2{
color:var(--green);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f8f8f8;
}

.total{
text-align:right;
font-size:20px;
font-weight:800;
margin-top:20px;
color:var(--green);
}

/* ================= BUTTONS ================= */

.btn{
margin-top:20px;
padding:15px;
width:100%;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

.btn-green{
background:var(--green);
color:white;
}

.btn-gold{
background:var(--gold);
color:black;
}

/* ================= FLOAT ================= */

.float{
position:fixed;
right:20px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
cursor:pointer;
z-index:999;
}

.whatsapp{
bottom:20px;
background:#25D366;
color:white;
}

.instagram{
bottom:95px;
background:#E1306C;
color:white;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.hero h1{
font-size:35px;
}

#menu{
width:85%;
}

}

</style>
</head>
<body>

<nav>

<div class="hamburger" onclick="openMenu()">
<i class="fas fa-bars"></i>
</div>

<div class="logo">
<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">
<h2>KABINI LTD</h2>
</div>

<div>
<i class="fas fa-file-invoice" style="font-size:25px;color:#0B3D2E;"></i>
</div>

</nav>

<div id="overlay" onclick="closeMenu()"></div>

<div id="menu">

<div class="menu-title">KABINI LTD</div>

<a href="index.html" class="menu-item">🏠 Home</a>
<a href="products.html" class="menu-item">🛒 Products</a>
<a href="cart.html" class="menu-item">🛍 Cart</a>
<a href="checkout.html" class="menu-item">💳 Checkout</a>
<a href="orders.html" class="menu-item">📦 Orders</a>
<a href="account.html" class="menu-item">👤 Account</a>
<a href="contact.html" class="menu-item">📞 Contact</a>

</div>

<section class="hero">
<h1>Invoice</h1>
<p>Your purchase receipts and billing details</p>
</section>

<section class="invoice-section">

<div class="invoice-box">

<div class="invoice-header">

<div>
<h2>Kabini Global Invoice</h2>
<p>Generated automatically from orders</p>
</div>

<div>
<p><b>Date:</b> <span id="date"></span></p>
<p><b>Invoice ID:</b> KG-<span id="invoiceId"></span></p>
</div>

</div>

<table>

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
</tr>
</thead>

<tbody id="invoiceTable">

<tr>
<td>No Items</td>
<td>-</td>
<td>-</td>
</tr>

</tbody>

</table>

<div class="total">
Total: ₦<span id="total">0</span>
</div>

<button class="btn btn-green" onclick="downloadInvoice()">
Download Invoice
</button>

<button class="btn btn-gold" onclick="sendWhatsApp()">
Send via WhatsApp
</button>

</div>

</section>

<div class="float whatsapp" onclick="openWhatsApp()">
<i class="fab fa-whatsapp"></i>
</div>

<div class="float instagram" onclick="openInstagram()">
<i class="fab fa-instagram"></i>
</div>

<script>

const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");

function openMenu(){
menu.style.left="0";
overlay.style.opacity="1";
overlay.style.visibility="visible";
}

function closeMenu(){
menu.style.left="-100%";
overlay.style.opacity="0";
overlay.style.visibility="hidden";
}

document.getElementById("date").innerText=new Date().toLocaleDateString();
document.getElementById("invoiceId").innerText=Math.floor(Math.random()*999999);

function loadInvoice(){

let orders=JSON.parse(localStorage.getItem("kabiniOrders"))||[];

let table=document.getElementById("invoiceTable");
let total=0;

table.innerHTML="";

orders.forEach(order=>{

(order.items||[]).forEach(item=>{

let price=Number(item.price)||0;
total+=price;

table.innerHTML+=`
<tr>
<td>${item.name}</td>
<td>1</td>
<td>₦${price}</td>
</tr>
`;

});

});

document.getElementById("total").innerText=total.toLocaleString();

}

function downloadInvoice(){
alert("Invoice download feature will be connected to PDF system next upgrade.");
}

function sendWhatsApp(){

let msg="Hello Kabini Global, here is my invoice request.";

window.open(
"https://wa.me/2348107808968?text="+encodeURIComponent(msg),
"_blank"
);

}

function openWhatsApp(){
window.open("https://wa.me/2348107808968","_blank");
}

function openInstagram(){
window.open("https://instagram.com","_blank");
}

loadInvoice();

</script>

</body>
</html>
